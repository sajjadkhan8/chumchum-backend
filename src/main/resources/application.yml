spring:
  application:
    name: chamcham-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/chamcham?currentSchema=core}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: core
  flyway:
    enabled: true
    create-schemas: true
    default-schema: core
    schemas: core
    locations: classpath:db/migration

server:
  port: ${PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    deep-linking: true
  swagger-ui.csrf:
    enabled: false

logging:
  level:
    org.springframework.security: INFO
    com.chamcham.backend: INFO

security:
  jwt:
    # Base64-encoded HMAC secret. Replace in production.
    secret: ${JWT_SECRET_BASE64:ZGV2LXNlY3JldC1yZXBsYWNlLXRoaXMtd2l0aC1hdC1sZWFzdC0zMi1ieXRlcy1mb3ItcHJvZA==}
    expiration-ms: ${JWT_EXPIRATION_MS:604800000}
  cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Strict}
    max-age-seconds: ${COOKIE_MAX_AGE:604800}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}

